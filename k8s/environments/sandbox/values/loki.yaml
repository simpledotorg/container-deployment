loki:
  gateway:
    ingress:
      enabled: true
      ingressClassName: "nginx"
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
        nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
        nginx.ingress.kubernetes.io/auth-type: basic
        nginx.ingress.kubernetes.io/auth-realm: 'Authentication Required'
        nginx.ingress.kubernetes.io/auth-secret: loki-basic-auth
      labels: {}
      hosts:
        - host: gateway.loki.sandbox.simple.org
          paths:
            - path: /
              pathType: ImplementationSpecific
      tls:
        - secretName: loki-gateway-tls
          hosts:
            - gateway.loki.sandbox.simple.org
  loki:
    storage:
      type: s3
      bucketNames:
        chunks: "rtsl-sandbox-loki"
        ruler:  "rtsl-sandbox-loki"
        admin:  "rtsl-sandbox-loki"
      s3:
        region: ap-south-1
        secretAccessKey: "${LOKI_S3_SECRETACCESSKEY}"
        accessKeyId: "${LOKI_S3_ACCESKEYID}"
    rulerConfig:
      alertmanager_url: http://alertmanager-main.monitoring.svc.cluster.local:9093
  backend:
    extraArgs:
      - '-config.expand-env=true'
    extraEnv:
      - name: LOKI_S3_ACCESKEYID
        valueFrom:
          secretKeyRef:
            name: loki-secrets
            key: LOKI_S3_ACCESKEYID
      - name: LOKI_S3_SECRETACCESSKEY
        valueFrom:
          secretKeyRef:
            name: loki-secrets
            key: LOKI_S3_SECRETACCESSKEY
  read:
    extraArgs:
      - '-config.expand-env=true'
    extraEnv:
      - name: LOKI_S3_ACCESKEYID
        valueFrom:
          secretKeyRef:
            name: loki-secrets
            key: LOKI_S3_ACCESKEYID
      - name: LOKI_S3_SECRETACCESSKEY
        valueFrom:
          secretKeyRef:
            name: loki-secrets
            key: LOKI_S3_SECRETACCESSKEY
  write:
    extraArgs:
      - '-config.expand-env=true'
    extraEnv:
      - name: LOKI_S3_ACCESKEYID
        valueFrom:
          secretKeyRef:
            name: loki-secrets
            key: LOKI_S3_ACCESKEYID
      - name: LOKI_S3_SECRETACCESSKEY
        valueFrom:
          secretKeyRef:
            name: loki-secrets
            key: LOKI_S3_SECRETACCESSKEY
  minio:
    enabled: false
  ruler:
    enbabled: true
    replicas: 1
    extraArgs:
      - '-config.expand-env=true'
    extraEnv:
      - name: LOKI_S3_ACCESKEYID
        valueFrom:
          secretKeyRef:
            name: loki-secrets
            key: LOKI_S3_ACCESKEYID
      - name: LOKI_S3_SECRETACCESSKEY
        valueFrom:
          secretKeyRef:
            name: loki-secrets
            key: LOKI_S3_SECRETACCESSKEY
    directories:
      tenant_foo:
        rules1.txt: |
          groups:
            - name: always_fire
              rules:
                - alert: AlwaysFiringAlert
                  expr: vector(1)
                  for: 10m
                  labels:
                    severity: critical
                  annotations:
                    summary: This alert is always firing for testing purposes
