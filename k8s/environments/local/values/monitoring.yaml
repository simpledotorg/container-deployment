prometheus:
  server:
    global:
      external_labels:
        product: "simple"
        environment: "local"
        project: "development"
    scrape_configs:
      - job_name: "nginx-ingress-controller"
        scrape_interval: 10s
        kubernetes_sd_configs:
          - role: service
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace]
            action: keep
            regex: ingress-nginx
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: ingress-nginx-controller-metrics
    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-staging"
        nginx.ingress.kubernetes.io/auth-type: basic
        nginx.ingress.kubernetes.io/auth-realm: 'Authentication Required'
        nginx.ingress.kubernetes.io/auth-secret: monitoring-basic-auth
      hosts:
        - prometheus.local.simple.org
      tls:
        - secretName: prometheus.local.simple.org-tls
          hosts:
            - prometheus.local.simple.org
  alertmanager:
    ingress:
      className: nginx
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-staging"
        nginx.ingress.kubernetes.io/auth-type: basic
        nginx.ingress.kubernetes.io/auth-realm: 'Authentication Required'
        nginx.ingress.kubernetes.io/auth-secret: monitoring-basic-auth
      hosts:
        - host: alertmanager.local.simple.org
          paths:
            - path: /
              pathType: ImplementationSpecific
      tls:
        - secretName: alertmanager.local.simple.org-tls
          hosts:
            - alertmanager.local.simple.org
    extraArgs:
      web.external-url: "https://alertmanager.local.simple.org"
      web.route-prefix: "/"
grafana:
  admin:
    existingSecret: "grafana-secrets"
  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-staging"
    hosts:
      - grafana.local.simple.org
    tls:
      - secretName: grafana.local.simple.org-tls
        hosts:
          - grafana.local.simple.org
  persistence:
    enabled: true
