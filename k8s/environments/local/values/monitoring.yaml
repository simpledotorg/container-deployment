prometheus:
  server:
    global:
      external_labels:
        product: "simple"
        environment: "local"
        project: "development"
    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-staging"
      hosts:
        - prometheus.local.simple.org
      tls:
        - secretName: prometheus.local.simple.org-tls
          hosts:
            - prometheus.local.simple.org
  alertmanager:
    ingress:
      className: nginx
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-staging"
      hosts:
        - host: alertmanager.local.simple.org
          paths:
            - path: /
              pathType: ImplementationSpecific
      tls:
        - secretName: alertmanager.local.simple.org-tls
          hosts:
            - alertmanager.local.simple.org
    extraArgs:
      web.external-url: "https://alertmanager.local.simple.org"
      web.route-prefix: "/"
grafana:
  admin:
    existingSecret: "grafana-secrets"
  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-staging"
    hosts:
      - grafana.local.simple.org
    tls:
      - secretName: grafana.local.simple.org-tls
        hosts:
          - grafana.local.simple.org
  persistence:
    enabled: true
