metabase:
  image:
    tag: "v0.44.5"
  config:
    database:
      type: "postgres"
  secrets:
    existingSecret:
      name: "simple-pguser-metabase"
      connectionURIKey: "jdbc-uri"
  ingress:
    enabled: true
    className: "nginx"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
