redis:
  image:
    registry: "docker.io"
    repository: "bitnami/redis"
    tag: "7.0.5-debian-11-r7"
  auth:
    enabled: false
  replica:
    replicaCount: 0
  master:
    persistence:
      size: 8Gi # This value should be >= to redis instance memory size
    podAnnotations:
      ad.datadoghq.com/redis.checks: |
        {
          "redisdb": {
            "init_config": {},
            "instances": [
              {
                "host": "%%host%%",
                "port":"6379",
                "password":"%%env_REDIS_PASSWORD%%"
              }
            ]
          }
        }
prometheus-redis-exporter:
  serviceMonitor:
    # When set true then use a ServiceMonitor to configure scraping
    enabled: true
    multipleTarget: true
    targets: 
    # for every targets, url and name must be set,
    # an individual additionalRelabeling can be set for every target
    - url: "redis://redis-master"
      name: "redis-master"
    # - url: "redis://my-redis-cluster:6379"
    #   name: "bar"
    #   additionalRelabeling:
    #   - sourceLabels: [type]
    #     targetLabel: type
    #     replacement: cluster
    #   additionalMetricsRelabels:
    #     type: clusterkkk
  labels:
    prometheus.io/path: /metrics
    prometheus.io/port: "9121"
    prometheus.io/scrape: "true"
