{{ $root := . }}
{{- range $path, $_ := .Files.Glob "dashboards_out/**.json" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Common"
  name: {{ base $path }}
data:
  {{ base $path }}:
{{ $root.Files.Get $path | toJson | indent 4 }}
{{ end }}
